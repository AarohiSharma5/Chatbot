# Render "Blueprint": describes how to build and run the app so the whole
# deploy can be created from this file. In Render: New + -> Blueprint ->
# pick your repo, and it reads this.
services:
  - type: web
    name: chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # 1 worker with several threads: enough for a demo, and threads let the
    # streaming endpoint serve one user while another is mid-reply.
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120
    envVars:
      # Use the cloud AI provider (the server has no local Ollama).
      - key: CHATBOT_AI_PROVIDER
        value: openrouter
      # Secret: leave blank here and paste your key in the Render dashboard.
      - key: OPENROUTER_API_KEY
        sync: false
      # Signs the session cookie that identifies each browser. Render
      # auto-generates a stable random value so logins/sessions survive
      # restarts. Never commit a real secret to the repo.
      - key: SECRET_KEY
        generateValue: true
      # Connection string for the Postgres database below. Render fills this
      # in automatically, so the app stores data on a durable database that
      # survives redeploys and sleeps (the local disk does NOT).
      - key: DATABASE_URL
        fromDatabase:
          name: chatbot-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"

# A managed Postgres database. On the free plan it's small but persistent.
databases:
  - name: chatbot-db
    plan: free
    databaseName: chatbot
    user: chatbot
