<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up &middot; ChatBot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #2e1c14 0%, #4e342e 55%, #6d4c41 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #faf6ef;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(46, 28, 20, 0.45);
      border: 1px solid #e6d8c3;
      overflow: hidden;
    }

    .card__header {
      background: linear-gradient(135deg, #4e342e 0%, #3e2723 100%);
      color: #f3e9d8;
      padding: 22px;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
    }

    .card__body { padding: 24px; }

    label {
      display: block;
      font-size: 13px;
      color: #7a6a58;
      margin: 14px 0 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cdb38c;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: #fffdf9;
      color: #3c2a21;
    }

    input:focus { border-color: #8a6d4f; }

    .hint { font-size: 12px; color: #a98c6d; margin-top: 5px; }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      background: linear-gradient(135deg, #6f4e37 0%, #5a3e2b 100%);
      color: #f0e6d2;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: linear-gradient(135deg, #5a3e2b 0%, #4b3621 100%); }

    .error {
      background: #f3d9d2;
      color: #7d2e1c;
      border: 1px solid #e0b3a8;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .alt {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #7a6a58;
    }

    .alt a { color: #6f4e37; font-weight: 600; text-decoration: none; }
    .alt a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__header">Create your account</div>
    <div class="card__body">
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="{{ url_for('register') }}">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" autofocus required />
        <div class="hint">3-30 characters.</div>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required />
        <div class="hint">At least 6 characters.</div>

        <button type="submit">Sign up</button>
      </form>
      <div class="alt">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
      </div>
    </div>
  </div>
</body>
</html>
