<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Chatbot</title>
  <style>
    /* ---- Basic page styling ---- */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #2e1c14 0%, #4e342e 55%, #6d4c41 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat {
      width: 100%;
      max-width: 460px;
      height: 640px;
      background: #faf6ef;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(46, 28, 20, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e6d8c3;
    }

    .chat__header {
      background: linear-gradient(135deg, #4e342e 0%, #3e2723 100%);
      color: #f3e9d8;
      padding: 18px 22px;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat__header .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #d4b483;
      box-shadow: 0 0 0 3px rgba(212, 180, 131, 0.25);
    }

    .chat__header .memories-link {
      margin-left: auto;
      color: #e6d3b3;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 11px;
      border: 1px solid #6d4c41;
      border-radius: 18px;
      transition: background 0.15s;
    }

    .chat__header .memories-link:hover { background: rgba(212, 180, 131, 0.15); }

    /* The "Forget me" button reuses the link look but is a real <button>. */
    .chat__header .header-btn {
      margin-left: 8px;
      background: transparent;
      font-family: inherit;
      cursor: pointer;
    }

    /* ---- Message list ---- */
    .chat__messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #efe3cf;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.4;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(46, 28, 20, 0.12);
    }

    .msg--bot {
      align-self: flex-start;
      background: #e6d3b3;
      color: #3c2a21;
      border-bottom-left-radius: 4px;
    }

    /* Animated "typing..." dots shown until the first reply chunk arrives. */
    .typing-dots span {
      display: inline-block;
      animation: blink 1.4s infinite both;
      font-weight: bold;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    .msg--user {
      align-self: flex-end;
      background: linear-gradient(135deg, #6f4e37 0%, #5a3e2b 100%);
      color: #f5efe2;
      border-bottom-right-radius: 4px;
    }

    /* ---- Input area ---- */
    .chat__input {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-top: 1px solid #e3d4ba;
      background: #f5efe2;
    }

    .chat__input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #cdb38c;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      background: #fffdf9;
      color: #3c2a21;
    }

    .chat__input input::placeholder { color: #a98c6d; }

    .chat__input input:focus { border-color: #8a6d4f; }

    .chat__input button {
      background: linear-gradient(135deg, #6f4e37 0%, #5a3e2b 100%);
      color: #f0e6d2;
      border: none;
      border-radius: 50%;
      width: 46px; height: 46px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .chat__input button:hover { background: linear-gradient(135deg, #5a3e2b 0%, #4b3621 100%); }

    .chat__input button:active { transform: scale(0.94); }
  </style>
</head>
<body>
  <div class="chat">
    <div class="chat__header">
      <span class="dot"></span>
      ChatBot
      <a class="memories-link" href="{{ url_for('memories_page') }}">Memory</a>
      <button type="button" id="reset" class="memories-link header-btn" title="Forget everything and start fresh">Forget me</button>
    </div>

    <div class="chat__messages" id="messages"></div>

    <form class="chat__input" id="form">
      <input id="input" type="text" placeholder="Type a message..." autocomplete="off" autofocus />
      <button type="submit">&#10148;</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("form");
    const inputEl = document.getElementById("input");

    // Add a message bubble to the screen.
    function addMessage(text, who) {
      const bubble = document.createElement("div");
      bubble.className = "msg msg--" + who;
      bubble.textContent = text;
      messagesEl.appendChild(bubble);
      // Always scroll to the newest message.
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    // "Type out" the bot's reply one character at a time (like the
    // terminal version's typing effect, but in the browser).
    function typeMessage(text) {
      const bubble = addMessage("", "bot");
      let i = 0;
      const timer = setInterval(() => {
        bubble.textContent += text[i];
        i++;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        if (i >= text.length) clearInterval(timer);
      }, 18);
    }

    // When the form is submitted, send the message and STREAM the reply.
    formEl.addEventListener("submit", async (event) => {
      event.preventDefault(); // stop the page from reloading
      const text = inputEl.value.trim();
      if (text === "") return;

      addMessage(text, "user");
      inputEl.value = "";

      // Call our streaming endpoint. Instead of waiting for the full reply,
      // we read the response body as a stream and append each chunk as it
      // arrives -- so the bot's answer "types itself" live.
      const bubble = addMessage("", "bot");
      // Show animated dots until the first chunk arrives (the bot is "thinking").
      bubble.innerHTML = '<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';
      let firstChunk = true;
      try {
        const response = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          if (firstChunk) {
            bubble.textContent = ""; // remove the typing dots
            firstChunk = false;
          }
          bubble.textContent += decoder.decode(value, { stream: true });
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      } catch (err) {
        bubble.textContent = "Oops, I couldn't reach the server.";
      }
    });

    // "Forget me": wipe everything on the server, then reset the screen.
    document.getElementById("reset").addEventListener("click", async () => {
      const ok = confirm("Forget your name, this chat, and everything I remember about you?");
      if (!ok) return;
      try {
        await fetch("/reset", { method: "POST" });
      } catch (err) {
        /* ignore network errors; we still clear the screen */
      }
      messagesEl.innerHTML = "";
      typeMessage("Okay, fresh start! What should I call you?");
    });

    // Greet the user when the page loads.
    window.addEventListener("load", () => {
      typeMessage("Hi! I'm your new friend. Tell me what's on your mind, I'm here to listen.");
    });
  </script>
</body>
</html>
