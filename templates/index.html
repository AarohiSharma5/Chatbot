<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Chatbot</title>
  <style>
    /* ---- Basic page styling ---- */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat {
      width: 100%;
      max-width: 460px;
      height: 640px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat__header {
      background: #4f46e5;
      color: #fff;
      padding: 18px 22px;
      font-weight: 600;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat__header .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #4ade80;
    }

    /* ---- Message list ---- */
    .chat__messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8fafc;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.4;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg--bot {
      align-self: flex-start;
      background: #e2e8f0;
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }

    .msg--user {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* ---- Input area ---- */
    .chat__input {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
    }

    .chat__input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
    }

    .chat__input input:focus { border-color: #4f46e5; }

    .chat__input button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 46px; height: 46px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .chat__input button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="chat__header">
      <span class="dot"></span>
      ChatBot
    </div>

    <div class="chat__messages" id="messages"></div>

    <form class="chat__input" id="form">
      <input id="input" type="text" placeholder="Type a message..." autocomplete="off" autofocus />
      <button type="submit">&#10148;</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("form");
    const inputEl = document.getElementById("input");

    // Add a message bubble to the screen.
    function addMessage(text, who) {
      const bubble = document.createElement("div");
      bubble.className = "msg msg--" + who;
      bubble.textContent = text;
      messagesEl.appendChild(bubble);
      // Always scroll to the newest message.
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    // "Type out" the bot's reply one character at a time (like the
    // terminal version's typing effect, but in the browser).
    function typeMessage(text) {
      const bubble = addMessage("", "bot");
      let i = 0;
      const timer = setInterval(() => {
        bubble.textContent += text[i];
        i++;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        if (i >= text.length) clearInterval(timer);
      }, 18);
    }

    // When the form is submitted, send the message to the server.
    formEl.addEventListener("submit", async (event) => {
      event.preventDefault(); // stop the page from reloading
      const text = inputEl.value.trim();
      if (text === "") return;

      addMessage(text, "user");
      inputEl.value = "";

      // Call our Flask /chat endpoint and wait for the reply.
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await response.json();
      typeMessage(data.reply);
    });

    // Greet the user when the page loads.
    window.addEventListener("load", () => {
      typeMessage("Hi! I'm your chatbot. Try 'hello', 'tell me a joke', or 'what is 5 + 3'.");
    });
  </script>
</body>
</html>
